# QMIX Multi-Agent Configuration

qmix:
  n_actions: 6
  gnn_hidden_dim: 128
  gnn_layers: 2
  rnn_hidden_dim: 128
  mixing_hidden_dim: 64
  lr: 5e-4
  gamma: 0.99
  target_update_interval: 200
  buffer_capacity: 5000
  batch_size: 32
  grad_clip: 10.0
  epsilon_start: 1.0
  epsilon_end: 0.05

reward:
  accuracy_weight: 1.0
  token_penalty_weight: 0.1
  max_tokens: 10000

training:
  num_episodes: 500
  num_rounds: 2
  log_interval: 10
  save_interval: 50

evaluation:
  num_rounds: 2
  decision_method: FinalRefer

llm:
  default_model: gpt-4o-mini
  temperature: 0.2
  max_tokens: 1024

agent_configs:
  coding:
    agents: [CodeWriter, CodeWriter, AnalyzeAgent]
    decision: FinalRefer
  math:
    agents: [MathSolver, MathSolver, AnalyzeAgent]
    decision: FinalRefer
  reasoning:
    agents: [ReasoningAgent, ReasoningAgent, AnalyzeAgent]
    decision: FinalRefer
  agentic:
    agents: [ReasoningAgent, ReasoningAgent, AnalyzeAgent]
    decision: FinalRefer
