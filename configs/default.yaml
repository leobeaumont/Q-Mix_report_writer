# QMIX Multi-Agent Configuration

qmix:
  n_actions: 16
  gnn_hidden_dim: 128
  gnn_layers: 2
  rnn_hidden_dim: 128
  mixing_hidden_dim: 64
  lr: 5e-4
  gamma: 0.99
  target_update_interval: 200
  buffer_capacity: 5000
  batch_size: 32
  grad_clip: 10.0
  epsilon_start: 1.0
  epsilon_end: 0.05

reward:
  report_quality_weight: 1.0
  length_weight: 0.1
  length_goal: 25000  # 25000 char -> ~4500 words -> ~1 scientific document
  length_sigma: 8500  # sigma of the gaussian curve: 8500 -> reward start at ~5000 char 

training:
  num_episodes: 500
  num_rounds: 2
  log_interval: 10
  save_interval: 50

evaluation:
  num_rounds: 2

llm:
  default_model: tinyllama
  temperature: 0.2
  max_tokens: 512
  ollama_base_url: http://localhost:11434

agent_configs:
  redacting:
    agents: [LeadArchitect, Researcher, DataAnalyst, TechnicalWriter, Reviewer, Collector]
