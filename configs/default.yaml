# QMIX Multi-Agent Configuration

qmix:
  n_actions: 16
  gnn_hidden_dim: 128
  gnn_layers: 2
  rnn_hidden_dim: 128
  mixing_hidden_dim: 64
  lr: 5e-4
  gamma: 0.99
  target_update_interval: 200
  buffer_capacity: 5000
  batch_size: 32
  grad_clip: 10.0
  epsilon_start: 1.0
  epsilon_end: 0.05

reward:
  report_quality_weight: 1.0
  length_weight: 0.1
  length_goal: 25000  # 25000 char -> ~4500 words -> ~1 scientific document
  length_sigma: 8500  # sigma of the gaussian curve: 8500 -> reward start at ~5000 char 

training:
  num_episodes: 500
  num_rounds: 2
  log_interval: 10
  save_interval: 50

evaluation:
  num_rounds: 2

rag:
  # Reranking mode applied after RRF fusion.
  # Options: "nomic" (nomic-embed-text cosine, default), "cross_encoder" (BAAI/bge-reranker-base)
  rerank_mode: nomic
  # Chunks returned per query during PLANNING only (topic discovery, breadth over depth).
  top_k_planning: 3
  # Chunks returned per query during RESEARCH, DRAFTING, and SECTION_REVIEW (evidence gathering).
  top_k_drafting: 5
  # Minimum BM25-only chunks guaranteed per retrieval result.
  # Only injects if the BM25 chunk ranked in the top-10 of the RRF pool (genuinely competitive).
  # Falls back to all-vector if no qualifying BM25 chunk exists. Set to 0 to disable.
  bm25_floor: 1

llm:
  default_model: alibayram/Qwen3-30B-A3B-Instruct-2507
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  min_p: 0.0
  max_tokens: 4096
  providers:
    ollama:
      base_url: http://localhost:11434
      models:
        - tinyllama
        - qwen3:4b
        - qwen3:8b
        - alibayram/Qwen3-30B-A3B-Instruct-2507

agent_configs:
  redacting:
    agents: [LeadArchitect, Researcher, DataAnalyst, Reviewer, Collector]
    respective_ollama_urls:
      LeadArchitect: http://localhost:11434
      Researcher: http://localhost:11434
      DataAnalyst: http://localhost:11434
      Reviewer: http://localhost:11434
      Collector: http://localhost:11434
    respective_max_tokens:
      # Ceilings cover thinking tokens + output tokens (qwen3 thinking overhead ~200-400t).
      # Calibrated to cut runaway loops (~4000t in trace 1) while allowing normal operation.
      # Other agents (Reviewer, Collector) keep the global max_tokens (4096).
      LeadArchitect: 1500
      Researcher: 1200     # output max ~471t + thinking overhead → 1200
      DataAnalyst: 2000    # output max ~479t + thinking overhead → raised for richer section content
